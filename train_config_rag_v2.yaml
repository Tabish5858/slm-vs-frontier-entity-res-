# RAG-aware fine-tuning: teach model to SELECT from candidates
model: mlx-community/Qwen2.5-3B-Instruct-4bit
train: true
data: ./data_rag_v2
fine_tune_type: lora
optimizer: adam
mask_prompt: true
num_layers: 16
batch_size: 4
iters: 800
val_batches: 50
learning_rate: 1.0e-4
lr_schedule: null
steps_per_report: 100
steps_per_eval: 200
save_every: 200
adapter_path: ./adapters_rag_v2
max_seq_length: 1536
seed: 42
grad_checkpoint: true
lora_parameters:
  rank: 16
  dropout: 0.0
  scale: 20.0
