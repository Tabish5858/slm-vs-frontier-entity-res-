adapter_path: ./adapters_rag
batch_size: 4
data: ./data_rag
fine_tune_type: lora
grad_checkpoint: true
iters: 800
learning_rate: 1e-4
lora_parameters:
  dropout: 0.0
  rank: 16
  scale: 10.0
lr_schedule:
  arguments:
  - 0.0001
  - 800
  - 1.0e-06
  name: cosine_decay
mask_prompt: true
max_seq_length: 2048
model: ./models/qwen2.5-3b-instruct-4bit
num_layers: 16
save_every: 200
seed: 42
steps_per_eval: 200
steps_per_report: 100
train: true
val_batches: 50
